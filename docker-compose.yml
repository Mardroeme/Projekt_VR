services:
  vr-app:
    build: .
    container_name: vr-app
    ports:
      - "5173:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://127.0.0.1:80/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  uptime-kuma:
    image: louislam/uptime-kuma:1
    container_name: uptime-kuma
    ports:
      - "3001:3001"
    restart: unless-stopped
    volumes:
      - uptime-kuma:/app/data

volumes:
  uptime-kuma: